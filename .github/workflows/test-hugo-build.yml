name: Test Hugo Build
on:
  push:
    branches:
      - 'test/*'
      - 'feature/*'
      - develop
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'themes/**'
      - 'static/**'
      - 'assets/**'
      - 'data/**'
      - 'i18n/**'
      - 'archetypes/**'
      - 'resources/**'
      - 'hugo.yml'
      - 'hugo.yaml'
      - 'hugo.toml'
      - 'config.yml'
      - 'config.yaml'
      - 'config.toml'
      - 'go.mod'
      - 'go.sum'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-hugo-build.yml'

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
      GO_VERSION: 1.26.2
      NODE_VERSION: 22.22.2

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Hugo
        run: |
          mkdir -p "${HOME}/.local/hugo"
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify Hugo installation
        run: |
          echo "Hugo: $(hugo version)"
          echo "Go: $(go version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Configure Git
        run: git config core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-test-${{ github.run_id }}-${{ github.sha }}
          restore-keys: |
            hugo-test-${{ github.run_id }}-
            hugo-test-
            hugo-

      - name: Test Hugo build (production)
        run: |
          hugo \
            --gc \
            --minify \
            --environment production \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --baseURL "/" \
            --destination public-test

      - name: Test Hugo build (development)
        run: |
          hugo \
            --buildDrafts \
            --buildFuture \
            --cacheDir "${{ runner.temp }}/hugo_cache" \
            --baseURL "/" \
            --destination public-dev-test

      - name: Validate generated content
        run: |
          if [ ! -f "public-test/index.html" ]; then
            echo "Error: index.html not generated"
            exit 1
          fi

      - name: Check for empty non-draft albums
        run: |
          empty_albums=()
          for dir in content/*/; do
            [ -d "$dir" ] || continue
            index_file="${dir}index.md"
            [ -f "$index_file" ] || continue
            if grep -qE '^draft:\s*true' "$index_file"; then
              continue
            fi
            image_count=$(find "$dir" -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' -o -iname '*.gif' \) | wc -l)
            if [ "$image_count" -eq 0 ]; then
              empty_albums+=("$dir")
            fi
          done
          if [ ${#empty_albums[@]} -gt 0 ]; then
            echo "Found non-draft albums with no images:"
            printf '  - %s\n' "${empty_albums[@]}"
            echo "Warning only — albums may use images from subdirectories."
          fi

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hugo-build-logs
          path: |
            public-test/
            public-dev-test/
          retention-days: 3
